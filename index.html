<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content= "width=device-width, initial-scale=1.0"> 
    <title>Soar, Raven, Soar</title>
    <link href="media/style.css" rel="stylesheet">
    <style>
     
      body{

        to {background-position:0 -200%}
      }

<body>

<article>
  <section>
